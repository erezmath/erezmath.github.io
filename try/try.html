<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Share UI Demo</title>
    <style>
        /* --- General Page Styles --- */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f5f7;
            padding: 20px;
            color: #333;
        }

        /* --- Lesson Card Styles --- */
        .lesson-card {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            max-width: 600px;
            overflow: hidden;
            border: 1px solid #eaeaea;
        }

        /* Using summary for the clickable title area */
        .lesson-card summary {
            padding: 18px 20px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            list-style: none; /* Hides default arrow in some browsers */
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .lesson-card summary::-webkit-details-marker {
            display: none; /* Hides default arrow in Safari/Chrome */
        }

        /* The content inside the lesson */
        .lesson-content {
            padding: 0 20px 10px 20px;
            border-top: 1px solid transparent;
        }
        
        .lesson-card[open] .lesson-content {
            border-top: 1px solid #f0f0f0;
            padding-top: 15px;
        }

        .lesson-content ul {
            padding-right: 20px;
            line-height: 1.6;
        }

        /* --- Share Footer Styles --- */
        .share-footer {
            display: flex;
            justify-content: flex-end; /* Aligns icons to the left in RTL */
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            padding-top: 10px;
            border-top: 1px dashed #e0e0e0;
        }

        .share-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, transform 0.1s;
            position: relative;
        }

        .share-btn svg {
            width: 20px;
            height: 20px;
            fill: #777; /* Default gray */
            transition: fill 0.2s;
        }

        /* Hover states */
        .share-btn:hover { background-color: #f0f0f0; transform: scale(1.05); }
        .share-btn.whatsapp:hover svg { fill: #25D366; } /* WhatsApp Green */
        .share-btn.copy:hover svg { fill: #007BFF; } /* Link Blue */

        /* --- Tooltip Styles --- */
        .tooltip {
            position: absolute;
            bottom: 100%; /* Position above the button */
            left: 50%;
            transform: translateX(-50%) translateY(-5px);
            background-color: #333;
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
        }

        /* Tiny triangle below the tooltip */
        .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -4px;
            border-width: 4px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }

        .share-btn.show-tooltip .tooltip {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(-10px);
        }

    </style>
</head>
<body>

    <details class="lesson-card" id="lesson-3">
        <summary>3. מעגל - אנך מרכזי ומרחק ממיתר</summary>
        <div class="lesson-content">
            <p>תאריך הגשה: חמישי, 12.02.2026</p>
            <p>שיעור כפול, אם לא מצליחים שאלה משיעורי הבית, העזרו בפתרונות בסיכום השיעור.</p>
            <ul>
                <li><a href="#">1. סיכום שיעור ופתרונות</a></li>
                <li><a href="#">2. ש.ב</a></li>
            </ul>
            
            <div class="share-footer">
                <button class="share-btn whatsapp" onclick="shareWhatsApp('lesson-3', '3. מעגל - אנך מרכזי ומרחק ממיתר')" aria-label="שתף בוואטסאפ">
                    <svg viewBox="0 0 24 24">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                    </svg>
                </button>

                <button class="share-btn copy" onclick="copyLink(this, 'lesson-3')" aria-label="העתק קישור">
                    <svg viewBox="0 0 24 24">
                        <path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/>
                    </svg>
                    <span class="tooltip">הקישור הועתק!</span>
                </button>
            </div>
        </div>
    </details>

    <script>
        // Get the base URL of the page (removing any existing #hashes)
        const getBaseUrl = () => window.location.origin + window.location.pathname;

        // Function to copy the direct link to the clipboard
        function copyLink(buttonElement, lessonId) {
            const linkToCopy = `${getBaseUrl()}#${lessonId}`;
            
            // Use the modern Clipboard API
            navigator.clipboard.writeText(linkToCopy).then(() => {
                // Show the tooltip
                buttonElement.classList.add('show-tooltip');
                
                // Hide the tooltip after 2 seconds
                setTimeout(() => {
                    buttonElement.classList.remove('show-tooltip');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
                alert("לא הצלחנו להעתיק את הקישור");
            });
        }

        // Function to open WhatsApp with a pre-filled message
        function shareWhatsApp(lessonId, lessonTitle) {
            const linkToShare = `${getBaseUrl()}#${lessonId}`;
            
            // Text to appear in WhatsApp
            const message = `בדוק את השיעור הזה ממתמטיקה: ${lessonTitle}\n\n${linkToShare}`;
            
            // Encode the text for URL compatibility
            const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(message)}`;
            
            // Open in a new tab/window
            window.open(whatsappUrl, '_blank');
        }

        // Optional: Automatically open a lesson if the user lands on the page WITH a hash in the URL
        window.addEventListener('DOMContentLoaded', () => {
            if(window.location.hash) {
                const targetLesson = document.querySelector(window.location.hash);
                if(targetLesson && targetLesson.tagName === 'DETAILS') {
                    targetLesson.open = true;
                    // Optional: Scroll smoothly to it
                    targetLesson.scrollIntoView({ behavior: 'smooth' });
                }
            }
        });
    </script>
</body>
</html>
