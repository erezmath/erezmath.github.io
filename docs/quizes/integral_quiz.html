                        { text: 'ידוע כי <span class="math-container">\\(\\int_{1}^{4} 3f(x)dx = 21\\)</span>. חשבו את <span class="math-container">\\(\\int_{1}^{4} f(x)dx\\)</span>.', options: [{ value: "correct", text: "\\(7\\)" }, { value: "wrong", text: "\\(21\\)" }, { value: "wrong", text: "\\(63\\)" }, { value: "wrong", text: "\\(18\\)" }], hint: 'חלקו את שני אגפי המשוואה הנתונה ב-3 כדי לבודד את האינטגרל המבוקש.' }
                    ]
                },
                {
                    title: 'd. + e. שיקוף ציר X והצרחת גבולות',
                    questions: [
                        { text: 'ידוע כי <span class="math-container">\\(\\int_{1}^{3} f(x)dx = 5\\)</span>. חשבו את <span class="math-container">\\(\\int_{1}^{3} -f(x)dx\\)</span>.', options: [{ value: "correct", text: "\\(-5\\)" }, { value: "wrong", text: "\\(5\\)" }, { value: "wrong", text: "\\(0\\)" }, { value: "wrong", text: "לא ניתן לדעת" }], hint: 'שיקוף הפונקציה סביב ציר X (כפל במינוס) הופך את סימן תוצאת האינטגרל.' },
                        { text: 'ידוע כי <span class="math-container">\\(\\int_{2}^{6} f(x)dx = 10\\)</span>. חשבו את <span class="math-container">\\(\\int_{6}^{2} f(x)dx\\)</span>.', options: [{ value: "correct", text: "\\(-10\\)" }, { value: "wrong", text: "\\(10\\)" }, { value: "wrong", text: "\\(0\\)" }, { value: "wrong", text: "לא ניתן לדעת" }], hint: 'כאשר מחליפים בין הגבול העליון לתחתון (הצרחה), תוצאת האינטגרל מוכפלת במינוס 1.' },
                        { text: 'ידוע כי <span class="math-container">\\(\\int_{0}^{5} f(x)dx = 8\\)</span>. חשבו את <span class="math-container">\\(\\int_{5}^{0} -f(x)dx\\)</span>.', options: [{ value: "correct", text: "\\(8\\)" }, { value: "wrong", text: "\\(-8\\)" }, { value: "wrong", text: "\\(0\\)" }, { value: "wrong", text: "לא ניתן לדעת" }], hint: 'יש כאן שתי פעולות שמכפילות במינוס: גם שיקוף ציר X וגם הצרחת גבולות. מינוס כפול מינוס נותן פלוס.' },
                        { text: 'ידוע כי <span class="math-container">\\(\\int_{2}^{4} f(x)dx = a\\)</span>. חשבו את <span class="math-container">\\(\\int_{4}^{2} 2f(x)dx\\)</span>.', options: [{ value: "correct", text: "\\(-2a\\)" }, { value: "wrong", text: "\\(2a\\)" }, { value: "wrong", text: "\\(-a\\)" }, { value: "wrong", text: "\\(a\\)" }], hint: 'הצרחת גבולות מוסיפה מינוס, וכפל בקבוע מכפיל ב-2. התוצאה היא הכפלה במינוס 2.' }

                {

                        { text: 'נתונה פונקציה <strong>אי-זוגית</strong> \\(f(x)\\). ידוע כי <span class="math-container">\\(\\int_{0}^{4} f(x)dx = 7\\)</span>. חשבו את <span class="math-container">\\(\\int_{-4}^{4} f(x)dx\\)</span>.', options: [{ value: "correct", text: "\\(0\\)" }, { value: "wrong", text: "\\(14\\)" }, { value: "wrong", text: "\\(7\\)" }, { value: "wrong", text: "לא ניתן לדעת" }], hint: 'בפונקציה אי-זוגית, השטחים משני צידי ציר ה-Y הופכיים בסימנם ומבטלים זה את זה כאשר הגבולות סימטריים.' },
                        { text: 'נתונה פונקציה <strong>זוגית</strong> \\(f(x)\\). ידוע כי <span class="math-container">\\(\\int_{0}^{3} f(x)dx = 5\\)</span>. חשבו את <span class="math-container">\\(\\int_{-3}^{3} f(x)dx\\)</span>.', options: [{ value: "correct", text: "\\(10\\)" }, { value: "wrong", text: "\\(0\\)" }, { value: "wrong", text: "\\(5\\)" }, { value: "wrong", text: "\\(-5\\)" }], hint: 'בפונקציה זוגית, יש סימטריה. השטח מימין לציר ה-Y זהה לשטח משמאל. לכן כופלים פי 2.' },
                        { text: 'נתונה פונקציה <strong>אי-זוגית</strong> \\(f(x)\\). חשבו את <span class="math-container">\\(\\int_{-2}^{2} (f(x) + 4)dx\\)</span>.', options: [{ value: "correct", text: "\\(16\\)" }, { value: "wrong", text: "\\(0\\)" }, { value: "wrong", text: "\\(8\\)" }, { value: "wrong", text: "\\(4\\)" }], hint: 'פצלו את האינטגרל: האינטגרל של \\(f(x)\\) בגבולות סימטריים הוא 0. נותר רק לחשב את האינטגרל של הקבוע 4 בקטע שבין -2 ל-2 (אורך הקטע הוא 4).' },
                        { text: 'נתונה פונקציה <strong>זוגית</strong> \\(f(x)\\). ידוע כי <span class="math-container">\\(\\int_{-5}^{5} f(x)dx = 20\\)</span>. חשבו את <span class="math-container">\\(\\int_{0}^{5} f(x)dx\\)</span>.', options: [{ value: "correct", text: "\\(10\\)" }, { value: "wrong", text: "\\(20\\)" }, { value: "wrong", text: "\\(0\\)" }, { value: "wrong", text: "\\(40\\)" }], hint: 'השטח הכולל מורכב משני חצאים שווים. לכן, מ-0 עד 5 השטח הוא חצי מהשטח הכולל.' },
                        { text: 'נתונה פונקציה <strong>אי-זוגית</strong> \\(f(x)\\). מצאו את \\(k\\) אם <span class="math-container">\\(\\int_{-a}^{a} f(x)dx = k\\)</span> (כאשר \\(a > 0\\)).', options: [{ value: "correct", text: "\\(0\\)" }, { value: "wrong", text: "\\(2a\\)" }, { value: "wrong", text: "\\(a\\)" }, { value: "wrong", text: "לא ניתן לדעת" }], hint: 'הגדרה: בכל גבול סימטרי סביב הראשית, אינטגרל של פונקציה אי-זוגית מתאפס לחלוטין.' }
                    ]
                },
                {
                    title: 'g. שילובים של הסעיפים הקודמים',
                    questions: [
                        { text: 'ידוע כי <span class="math-container">\\(\\int_{1}^{4} f(x)dx = 6\\)</span>. חשבו את <span class="math-container">\\(\\int_{1}^{4} (2f(x) - 3)dx\\)</span>.', options: [{ value: "correct", text: "\\(3\\)" }, { value: "wrong", text: "\\(9\\)" }, { value: "wrong", text: "\\(12\\)" }, { value: "wrong", text: "\\(0\\)" }], hint: 'הכפילו את הערך הנתון ב-2 (מתיחה), והפחיתו ממנו את שטח המלבן של 3 (גובה 3 כפול אורך קטע 3).' },
                        { text: 'ידוע כי <span class="math-container">\\(\\int_{0}^{5} f(x)dx = 10\\)</span>. חשבו את <span class="math-container">\\(\\int_{2}^{7} (3f(x-2) + 1)dx\\)</span>.', options: [{ value: "correct", text: "\\(35\\)" }, { value: "wrong", text: "\\(31\\)" }, { value: "wrong", text: "\\(30\\)" }, { value: "wrong", text: "לא ניתן לדעת" }], hint: 'ההזזה האופקית זהה לזו של הגבולות (2 ימינה), לכן ערך האינטגרל של f נשמר. כעת הכפילו ב-3, והוסיפו את האינטגרל של הקבוע 1 (אורך הקטע הוא 5).' },
                        { text: 'ידוע כי <span class="math-container">\\(\\int_{0}^{5} f(x)dx = 10\\)</span>. האם ניתן לחשב את <span class="math-container">\\(\\int_{1}^{6} (3f(x-2) + 1)dx\\)</span>?', options: [{ value: "correct", text: "לא ניתן לדעת" }, { value: "wrong", text: "\\(35\\)" }, { value: "wrong", text: "\\(36\\)" }, { value: "wrong", text: "\\(16\\)" }], hint: 'שימו לב: הפונקציה הוזזה 2 יחידות ימינה, אך הגבולות הוזזו רק יחידה אחת ימינה (מ-0 ו-5 ל-1 ו-6). השטח לא נשמר ולא ניתן לחשב.' },
                        { text: 'ידוע כי <span class="math-container">\\(\\int_{3}^{6} f(x)dx = 8\\)</span>. חשבו את <span class="math-container">\\(\\int_{4}^{7} (0.5f(x-1) + 4)dx\\)</span>.', options: [{ value: "correct", text: "\\(16\\)" }, { value: "wrong", text: "\\(8\\)" }, { value: "wrong", text: "\\(12\\)" }, { value: "wrong", text: "\\(4\\)" }], hint: 'הפונקציה והגבולות זזו יחידה אחת ימינה. כפלו את הערך המקורי (8) בחצי, והוסיפו את שטח המלבן של 4 באורך קטע 3 (7 פחות 4).' },
                        { text: 'ידוע כי <span class="math-container">\\(\\int_{1}^{3} f(x)dx = 5\\)</span>. מצאו את \\(a\\) אם נתון: <span class="math-container">\\(\\int_{1}^{3} (a \\cdot f(x) + 2)dx = 14\\)</span>.', options: [{ value: "correct", text: "\\(2\\)" }, { value: "wrong", text: "\\(4\\)" }, { value: "wrong", text: "\\(3\\)" }, { value: "wrong", text: "\\(1\\)" }], hint: 'בנו משוואה: a כפול 5, פלוס האינטגרל של הקבוע 2 (שהוא 2 כפול אורך הקטע 2 = 4) שווה ל-14.' },
                        { text: 'ידוע כי <span class="math-container">\\(\\int_{0}^{2} f(x)dx = 3\\)</span>. מצאו את \\(k\\) אם נתון: <span class="math-container">\\(\\int_{3}^{5} (2f(x-3) + k)dx = 16\\)</span>.', options: [{ value: "correct", text: "\\(5\\)" }, { value: "wrong", text: "\\(10\\)" }, { value: "wrong", text: "\\(2\\)" }, { value: "wrong", text: "\\(8\\)" }], hint: 'הפונקציה והגבולות זזו ב-3 יחידות ימינה. האינטגרל החדש של f הוא 3 כפול 2 = 6. לכן, 6 ועוד 2k (כי אורך הקטע הוא 2) שווה 16.' },
                        { text: 'נתונה פונקציה <strong>זוגית</strong> \\(f(x)\\). ידוע כי <span class="math-container">\\(\\int_{0}^{2} f(x)dx = 4\\)</span>. מצאו את \\(c\\) אם <span class="math-container">\\(\\int_{-2}^{2} (c \\cdot f(x) - 1)dx = 12\\)</span>.', options: [{ value: "correct", text: "\\(2\\)" }, { value: "wrong", text: "\\(4\\)" }, { value: "wrong", text: "\\(1\\)" }, { value: "wrong", text: "\\(3\\)" }], hint: 'מכיוון ש-f זוגית, האינטגרל ממינוס 2 עד 2 הוא פעמיים מ-0 עד 2 (כלומר 8). האינטגרל של 1- בקטע זה הוא 4-. לכן המשוואה היא: 8c פחות 4 שווה ל-12.' }
                    ]
                }
            ]
        }
    ];

    // ==========================================
    // PRESENTATION LAYER (UI Rendering)
    // ==========================================
    
    // יצירת תפריט הניווט
    function initNav() {
        const navContainer = document.getElementById('nav-container');
        let navHtml = '';
        quizzesData.forEach((quiz, index) => {
            navHtml += `<button id="nav-btn-${index}" onclick="renderQuiz(${index})">${quiz.title.split(':')[0]}</button>`;
        });
        navContainer.innerHTML = navHtml;
    }

    // רינדור בוחן ספציפי
    function renderQuiz(index) {
        // עדכון מצב כפתורי הניווט
        quizzesData.forEach((_, i) => {
            const btn = document.getElementById(`nav-btn-${i}`);
            if(i === index) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });

        const quiz = quizzesData[index];
        let html = `<div class="center-wrapper"><h1 class="quiz-header">${quiz.title}</h1></div>`;

        // אם יש בלוק נוסחאות והסברים, הוסף אותו
        if (quiz.formulas) {
            html += `<div class="formula-box"><h3>תזכורת והסבר:</h3>${quiz.formulas}</div>`;
        }

        // לולאה על הסעיפים והשאלות
        quiz.sections.forEach((sec, sIdx) => {
            html += `<div class="section-box"><h2>${sec.title}</h2>`;
            sec.questions.forEach((q, qIdx) => {
                const qId = `q_${index}_${sIdx}_${qIdx}`;
                html += `
                <div class="question-box">
                    <div class="question-text">${qIdx + 1}. ${q.text}</div>
                    <div class="options">`;
                
                // הוספת האופציות
                q.options.forEach((opt, oIdx) => {
                    html += `
                        <label>
                            <input type="radio" name="${qId}" value="${opt.value}"> 
                            <span class="math-container">${opt.text}</span>
                        </label>`;
                });

                html += `
                    </div>
                    <div class="actions">
                        <button class="action-btn" onclick="checkAnswer('${qId}')">בדוק תשובה</button>
                        <button class="action-btn hint-btn" onclick="toggleHint('hint_${qId}')">רמז</button>
                    </div>
                    <div id="hint_${qId}" class="hint-box">רמז: ${q.hint}</div>
                    <div id="feedback_${qId}" class="feedback"></div>
                </div>`;
            });
            html += `</div>`;
        });

        // עדכון ה-DOM
        document.getElementById('quiz-container').innerHTML = html;
        window.scrollTo(0, 0); // גלילה למעלה בעת החלפת בוחן

        // בקשה מ-MathJax לרנדר מחדש את המתמטיקה שנוספה ל-DOM
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    // בדיקת תשובה
    function checkAnswer(questionId) {
        const selected = document.querySelector(`input[name="${questionId}"]:checked`);
        const feedbackEl = document.getElementById(`feedback_${questionId}`);
        
        if (!selected) {
            feedbackEl.textContent = "אנא בחרו תשובה לפני הבדיקה.";
            feedbackEl.className = "feedback incorrect";
            feedbackEl.style.display = "block";
            return;
        }

        if (selected.value === "correct") {
            feedbackEl.textContent = "כל הכבוד! תשובה נכונה.";
            feedbackEl.className = "feedback correct";
        } else {
            feedbackEl.textContent = "תשובה שגויה. נסו שוב או היעזרו ברמז.";
            feedbackEl.className = "feedback incorrect";
        }
        feedbackEl.style.display = "block";
    }

    // הצגה והסתרה של רמז
    function toggleHint(hintId) {
        const hintEl = document.getElementById(hintId);
        if (hintEl.style.display === "none" || hintEl.style.display === "") {
            hintEl.style.display = "block";
        } else {
            hintEl.style.display = "none";
        }
    }

    // אתחול האפליקציה בטעינה הראשונה (הצגת תפריט ובוחן ראשון)
    window.onload = () => {
        initNav();
        renderQuiz(0);
    };

</script>
